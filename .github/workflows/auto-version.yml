name: Auto Version

# Automatically bumps package.json from conventional commits and tags the
# release. The pushed vX.Y.Z tag then triggers release.yml to publish to npm.
#
# Bump rules (for the 0.x line):
#   feat / breaking  -> minor
#   fix / perf       -> patch
#   anything else    -> no release
#
# No version is ever hardcoded: every version is derived in CI from the
# commit history since the last tag.

on:
  push:
    branches:
      - master

permissions:
  contents: write

concurrency:
  group: auto-version
  cancel-in-progress: false

jobs:
  bump:
    name: Bump version from commits
    runs-on: ubuntu-latest
    # Skip the auto-generated release commit to avoid a bump loop.
    if: ${{ github.event.head_commit == null || !startsWith(github.event.head_commit.message, 'chore(release)') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Determine version bump
        id: bump
        run: |
          set -e
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          RANGE="${LAST_TAG:+$LAST_TAG..}HEAD"
          echo "Analyzing commits in range: $RANGE"
          MESSAGES=$(git log --format='%s' $RANGE)
          echo "$MESSAGES"
          BUMP=skip
          if echo "$MESSAGES" | grep -Eq '^[a-z]+(\([^)]+\))?!:'; then
            BUMP=minor   # breaking change in 0.x bumps minor
          elif echo "$MESSAGES" | grep -Eq '^feat(\([^)]+\))?:'; then
            BUMP=minor
          elif echo "$MESSAGES" | grep -Eq '^(fix|perf|refactor)(\([^)]+\))?:'; then
            BUMP=patch
          fi
          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"

      - name: Apply version bump
        if: steps.bump.outputs.bump != 'skip'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          npm version "${{ steps.bump.outputs.bump }}" -m "chore(release): %s"
          git push --follow-tags origin master

      - name: No releasable commits
        if: steps.bump.outputs.bump == 'skip'
        run: echo "No feat/fix/perf commits since last release; no version bump."
