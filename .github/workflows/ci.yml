name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:

jobs:
  check:
    name: Check package
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check CLI syntax
        run: npm run check

      - name: Preflight example config
        run: npm run preflight:example

      - name: Preflight example manifest
        run: npm run preflight-all:example

      - name: Build docs
        run: npm run docs:build
