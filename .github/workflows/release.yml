name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish_npm:
        description: "Publish package to npm"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Build release
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"

      - name: Check CLI syntax
        run: npm run check

      - name: Preflight examples
        run: |
          npm run preflight:example
          npm run preflight-all:example

      - name: Build docs
        run: npm run docs:build

      - name: Pack npm package
        run: npm pack

      - name: Check npm version
        id: npm_version
        shell: bash
        run: |
          set +e
          package_name="$(node -p "require('./package.json').name")"
          package_version="$(node -p "require('./package.json').version")"
          npm view "${package_name}@${package_version}" version >/dev/null 2>&1
          if [ "$?" -eq 0 ]; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "${package_name}@${package_version} is already published."
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
            echo "${package_name}@${package_version} is not published yet."
          fi

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: npm-package
          path: "*.tgz"

      - name: Publish to npm
        if: (github.event_name == 'push' || inputs.publish_npm == 'true') && steps.npm_version.outputs.published != 'true'
        run: npm publish --access public --provenance

      - name: Create GitHub release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          files: "*.tgz"
